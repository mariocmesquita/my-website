name: Deploy API to VPS

on:
    push:
        branches: [main]
        paths:
            - "apps/api/**"
            - "packages/env/**"
            - "packages/schemas/**"
            - "docker-compose.yml"
            - ".npmrc"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io

jobs:
    verificar:
        name: Type check and lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.28.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate Prisma client
              run: pnpm --filter api exec prisma generate

            - name: Type check
              run: pnpm --filter api run check-types

            - name: Lint
              run: pnpm --filter api exec prettier --check "src/**/*.ts" && pnpm --filter api exec eslint "{src,apps,libs,test}/**/*.ts"

    build-e-publicar:
        name: Build and publish image
        needs: verificar
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        outputs:
            tags: ${{ steps.meta.outputs.tags }}
        steps:
            - uses: actions/checkout@v4

            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Lowercase image name
              run: echo "IMAGE_NAME=$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')/my-website-api" >> $GITHUB_ENV

            - uses: docker/metadata-action@v5
              id: meta
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha,prefix=,format=short
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - uses: docker/setup-buildx-action@v3

            - uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/api/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    implantar:
        name: Deploy to VPS
        needs: build-e-publicar
        runs-on: ubuntu-latest
        steps:
            - uses: appleboy/ssh-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
                  envs: GITHUB_TOKEN,GITHUB_ACTOR
                  script: |
                      set -e
                      cd /opt/my-website
                      git pull origin main
                      echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
                      docker compose pull api
                      docker compose up -d --no-build api
                      docker image prune -f
                      docker ps
