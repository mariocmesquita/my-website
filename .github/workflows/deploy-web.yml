name: Deploy Web to VPS

on:
    push:
        branches: [main]
        paths:
            - "apps/web/**"
            - "packages/env/**"
            - "packages/schemas/**"
            - "docker-compose.yml"
            - ".npmrc"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io

jobs:
    verificar:
        name: Type check and lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.28.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm --filter web run check-types

            - name: Lint
              run: pnpm --filter web exec prettier --check "src/**/*.{ts,tsx}" && pnpm --filter web exec eslint

    build-e-publicar:
        name: Build and publish image
        needs: verificar
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Lowercase image name
              run: echo "IMAGE_NAME=$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')/my-website-web" >> $GITHUB_ENV

            - uses: docker/metadata-action@v5
              id: meta
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha,prefix=,format=short
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - uses: docker/setup-buildx-action@v3

            - uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/web/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
                      NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
                      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
                      NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
                      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
                      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
                      NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

    implantar:
        name: Deploy to VPS
        needs: build-e-publicar
        runs-on: ubuntu-latest
        steps:
            - name: Testar conectividade com VPS
              run: |
                  echo "Testando conectividade na porta 22..."
                  nc -zv ${{ secrets.VPS_HOST }} 22 && echo "Porta 22 acessível" || echo "Porta 22 INACESSÍVEL"

            - uses: appleboy/ssh-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
                  envs: GITHUB_TOKEN,GITHUB_ACTOR
                  script: |
                      set -e
                      cd /opt/my-website
                      git pull origin main
                      echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
                      docker compose pull web
                      docker compose up -d --no-build web
                      docker image prune -f
                      docker ps
