name: Implantar Web no VPS

on:
    push:
        branches: [main]
        paths:
            - "apps/web/**"
            - "packages/env/**"
            - "packages/schemas/**"
            - "docker-compose.yml"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io

jobs:
    verificar:
        name: Verificar tipos e lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.28.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Instalar dependências
              run: pnpm install --frozen-lockfile

            - name: Verificar tipos
              run: pnpm --filter web run check-types

            - name: Lint
              run: pnpm --filter web exec prettier --check "src/**/*.{ts,tsx}" && pnpm --filter web exec eslint

    build-e-publicar:
        name: Build e publicar imagem
        needs: verificar
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Formatar nome da imagem em minúsculas
              run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/my-website-web" >> $GITHUB_ENV

            - uses: docker/metadata-action@v5
              id: meta
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha,prefix=,format=short
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - uses: docker/setup-buildx-action@v3

            - uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/web/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
                      NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
                      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
                      NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
                      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
                      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
                      NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

    implantar:
        name: Implantar no VPS
        needs: build-e-publicar
        runs-on: ubuntu-latest
        steps:
            - uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
                  envs: GITHUB_TOKEN,GITHUB_ACTOR
                  env:
                      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                      GITHUB_ACTOR: ${{ github.actor }}
                  script: |
                      set -e
                      cd /opt/my-website

                      # Atualiza o docker-compose.yml caso tenha mudado
                      git pull origin main

                      # Faz login no GHCR para puxar a nova imagem
                      echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

                      # Puxa a nova imagem do frontend
                      docker compose pull web

                      # Reinicia apenas o serviço web com a nova imagem
                      docker compose up -d --no-build web

                      # Remove imagens antigas sem uso
                      docker image prune -f

                      docker ps
