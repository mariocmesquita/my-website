services:
  db:
    image: postgres:17-alpine
    container_name: my_website_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_website
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
